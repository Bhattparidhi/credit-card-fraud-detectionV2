# 🔧 Fraud Detection System Configuration

# ============================================================================
# MODEL SETTINGS
# ============================================================================

[model]
# Which model to use: "8_feature" or "18_feature"
model_type = "8_feature"

# Fraud probability threshold (0.0 - 1.0)
fraud_probability_threshold = 0.15

# Risk score threshold (0 - 100)
risk_score_threshold = 50

# Enable model auto-retraining
enable_auto_retraining = False

# Retrain interval (number of transactions)
retrain_interval = 1000

# ============================================================================
# ALERT SETTINGS
# ============================================================================

[alerts]
# Enable audio alerts
enable_audio_alerts = True

# Enable visual alerts
enable_visual_alerts = True

# Enable pulsing animation
enable_pulsing_animation = True

# Send email alerts
enable_email_alerts = False

# Email address for alerts
alert_email = "admin@frauddetection.com"

# Enable SMS alerts
enable_sms_alerts = False

# SMS phone number
alert_phone = "+91-XXXXXXXXXX"

# ============================================================================
# RISK FACTOR WEIGHTS
# ============================================================================

[risk_factors]
# How much each factor contributes to risk score

# High amount factor (> 1M)
high_amount_weight = 10

# Zero balance sender factor
zero_balance_sender_weight = 15

# High velocity factor (early time steps)
high_velocity_weight = 8

# Previous fraud history factor (per fraud)
fraud_history_weight = 5

# Weekend transaction factor
weekend_transaction_weight = 5

# New account factor
new_account_weight = 20

# New device factor
new_device_weight = 15

# Unknown recipient factor
unknown_recipient_weight = 25

# Network fraud ring factor
fraud_ring_weight = 50

# ============================================================================
# UI SETTINGS
# ============================================================================

[ui]
# Theme: "light" or "dark"
theme = "dark"

# Show confidence scores
show_confidence_scores = True

# Show risk factor breakdown
show_risk_factors = True

# Show detailed analysis
show_detailed_analysis = True

# Show transaction history
show_transaction_history = True

# Show analytics dashboard
show_analytics = True

# Transaction history limit (max transactions to keep)
history_limit = 1000

# ============================================================================
# DATA SETTINGS
# ============================================================================

[data]
# CSV file name for transactions
csv_file = "transactions.csv"

# Database connection (optional)
use_database = False
database_url = "postgresql://user:password@localhost:5432/fraud_db"

# ============================================================================
# FEATURE ENGINEERING SETTINGS
# ============================================================================

[features]
# Include balance change features
use_balance_features = True

# Include velocity features
use_velocity_features = True

# Include time-based features
use_time_features = True

# Include device fingerprinting
use_device_fingerprinting = False

# Include geographic features
use_geographic_features = False

# Include behavioral features
use_behavioral_features = False

# ============================================================================
# LOGGING SETTINGS
# ============================================================================

[logging]
# Enable logging
enable_logging = True

# Log level: DEBUG, INFO, WARNING, ERROR
log_level = "INFO"

# Log file
log_file = "fraud_detection.log"

# ============================================================================
# PERFORMANCE SETTINGS
# ============================================================================

[performance]
# Cache model predictions
enable_caching = True

# Cache expiration time (seconds)
cache_expiration = 3600

# Batch processing size
batch_size = 100

# Number of worker threads
num_workers = 4

# ============================================================================
# ADVANCED SETTINGS
# ============================================================================

[advanced]
# Enable SHAP explanations (slower but more interpretable)
enable_shap_explanations = False

# Enable ensemble models
enable_ensemble = False

# Ensemble voting strategy: "average", "weighted", "majority"
ensemble_strategy = "average"

# Enable anomaly detection
enable_anomaly_detection = False

# Anomaly detection method: "isolation_forest", "local_outlier_factor"
anomaly_method = "isolation_forest"

# Enable real-time model adaptation
enable_model_adaptation = False

# ============================================================================
# SECURITY SETTINGS
# ============================================================================

[security]
# Encrypt sensitive data in database
enable_encryption = False

# Encryption algorithm
encryption_algorithm = "AES-256"

# Enable user authentication
enable_authentication = False

# Session timeout (minutes)
session_timeout = 30

# ============================================================================
# API SETTINGS
# ============================================================================

[api]
# Enable REST API endpoint
enable_api = False

# API port
api_port = 8000

# API host
api_host = "0.0.0.0"

# Enable API authentication
api_require_auth = False

# API key
api_key = "your-secret-key-here"

# Rate limiting (requests per minute)
rate_limit = 100

# ============================================================================
# MONITORING SETTINGS
# ============================================================================

[monitoring]
# Enable system monitoring
enable_monitoring = True

# Monitor memory usage
monitor_memory = True

# Monitor model performance
monitor_model_performance = True

# Alert threshold for memory usage (%)
memory_alert_threshold = 80

# Alert threshold for low model accuracy (%)
accuracy_alert_threshold = 90

# ============================================================================
# DEFAULTS
# ============================================================================

[defaults]
# Default transaction type
default_transaction_type = "TRANSFER"

# Default time step
default_time_step = 100

# Default amount
default_amount = 100000

# Show home page on startup
show_home_page = True

# Auto-refresh analytics
auto_refresh_analytics = False

# Auto-refresh interval (seconds)
refresh_interval = 60
